<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"/>
    <title>GISAP避難所サンプル</title>
    <script type="text/javascript" src="https://www.gisap-cloud.com/dev/embcomm/gwk.js?loadJQuery=true&callback=loadedCallback"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
      #attribution{display: none}
      #firstLoader{
        position: absolute;
        width: 100dvw;
        height: 100dvh;
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #firstLoader > div {
        width: 280px;
        height: 350px;
        border-radius: 10px;
        background-color: #48af7f;
        color: #fff;
        box-sizing: border-box;
        padding-top: 30px;
        text-align: center;
        font-size: 60px;
        font-weight: bold;
      }
      #firstLoader > div i:before {
        font-size: 87px;
        padding-bottom: 30px;
      }
      body.error #firstLoader,
      body.login #firstLoader,
      body.app-loaded #firstLoader {
        display: none;
      }
      .z {display: none}
      #root {
        width: 100vw;
        height: 100vh;
        position: absolute;
        top: 0px;
        left: 0px;
      }
    </style>
    <script type="text/javascript">var loadedCallback = () => {console.log('load fail')};var dataSendFunction = () => {}</script>
  </head>
  <body>
    <div id="firstLoader"><div><i class="bi bi-person-walking"></i><br/>防災<br/>マップ</div></div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
